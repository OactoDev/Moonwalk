<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Moonwalk Bridge Settings</title>
    <style>
      body {
        margin: 0;
        padding: 24px;
        max-width: 480px;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f1115;
        color: #f3f5f7;
      }
      h1 {
        font-size: 18px;
        margin: 0 0 6px;
      }
      .subtitle {
        color: #9aa4b2;
        font-size: 12px;
        margin-bottom: 20px;
      }
      .field {
        margin-bottom: 16px;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 600;
        color: #c8cdd4;
        margin-bottom: 6px;
      }
      .hint {
        font-size: 11px;
        color: #6b7280;
        margin-top: 4px;
      }
      input[type="text"], input[type="password"] {
        width: 100%;
        box-sizing: border-box;
        padding: 10px 12px;
        border: 1px solid #262b36;
        border-radius: 8px;
        background: #151923;
        color: #f3f5f7;
        font-size: 13px;
        outline: none;
      }
      input:focus {
        border-color: #4c8dff;
      }
      .actions {
        display: flex;
        gap: 10px;
        margin-top: 20px;
      }
      button {
        flex: 1;
        border: 0;
        border-radius: 8px;
        padding: 10px 16px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      .btn-primary {
        background: #4c8dff;
        color: white;
      }
      .btn-secondary {
        background: #2a3140;
        color: #c8cdd4;
      }
      .status {
        margin-top: 12px;
        padding: 8px 12px;
        border-radius: 8px;
        font-size: 12px;
        display: none;
      }
      .status.ok {
        display: block;
        background: rgba(96, 211, 148, 0.15);
        color: #60d394;
        border: 1px solid rgba(96, 211, 148, 0.3);
      }
      .status.err {
        display: block;
        background: rgba(255, 123, 114, 0.15);
        color: #ff7b72;
        border: 1px solid rgba(255, 123, 114, 0.3);
      }
    </style>
  </head>
  <body>
    <h1>Moonwalk Bridge Settings</h1>
    <p class="subtitle">Configure the connection to your Moonwalk desktop app.</p>

    <div class="field">
      <label for="bridgeUrl">Bridge WebSocket URL</label>
      <input type="text" id="bridgeUrl" placeholder="ws://127.0.0.1:8765" />
      <div class="hint">The WebSocket URL of the Moonwalk browser bridge server running on your machine.</div>
    </div>

    <div class="field">
      <label for="bridgeToken">Bridge Token</label>
      <input type="password" id="bridgeToken" placeholder="Enter bridge authentication token" />
      <div class="hint">Authentication token for the bridge connection. Must match the token in your Moonwalk settings.</div>
    </div>

    <div class="actions">
      <button class="btn-primary" id="saveBtn">Save Settings</button>
      <button class="btn-secondary" id="resetBtn">Reset to Defaults</button>
    </div>

    <div class="status" id="status"></div>

    <script src="options.js"></script>
  </body>
</html>
