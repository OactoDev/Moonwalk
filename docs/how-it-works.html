<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moonwalk — How It Works</title>
  <link rel="stylesheet" href="slides/shared.css">
</head>
<body>
  <div class="progress"><div class="progress__fill" id="bar"></div></div>
  <div class="deck" id="deck"></div>
  <div class="ctrl">
    <button class="ctrl__btn" id="btn-prev" aria-label="Previous">‹</button>
    <button class="ctrl__btn" id="btn-play" aria-label="Play">▶</button>
    <button class="ctrl__btn" id="btn-next" aria-label="Next">›</button>
    <span class="ctrl__num" id="counter">1 / 28</span>
  </div>
  <script src="slides/engine.js"></script>
</body>
</html>
