<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 920" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#f5f5f7" stop-opacity="0.78"/>
    </linearGradient>
    <linearGradient id="accentBlue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="100%" stop-color="#409cff"/>
    </linearGradient>
    <linearGradient id="accentPurple" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#af52de"/>
      <stop offset="100%" stop-color="#c77dff"/>
    </linearGradient>
    <linearGradient id="accentGreen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34c759"/>
      <stop offset="100%" stop-color="#5dd87a"/>
    </linearGradient>
    <linearGradient id="accentPeach" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff2d55"/>
      <stop offset="100%" stop-color="#ff6482"/>
    </linearGradient>
    <linearGradient id="accentYellow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffcc00"/>
      <stop offset="100%" stop-color="#ffd633"/>
    </linearGradient>
    <linearGradient id="darkCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d1d1f"/>
      <stop offset="100%" stop-color="#2c2c2e"/>
    </linearGradient>
    <!-- Pipeline gradient (top-to-bottom flow) -->
    <linearGradient id="pipeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#007aff"/>
      <stop offset="50%" stop-color="#af52de"/>
      <stop offset="100%" stop-color="#34c759"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-3%" width="108%" height="112%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.10"/>
    </filter>
    <filter id="shadowSm" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.08"/>
    </filter>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#007aff"/>
    </marker>
    <marker id="arrowPurple" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#af52de"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34c759"/>
    </marker>
    <marker id="arrowPeach" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#ff2d55"/>
    </marker>
    <marker id="arrowMuted" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6e6e73"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1100" height="920" rx="20" fill="#f5f5f7"/>

  <!-- Title -->
  <text x="550" y="46" text-anchor="middle" font-size="22" font-weight="700" fill="#1d1d1f" letter-spacing="-0.02em">Moonwalk · Agent Pipeline (SPAV Loop)</text>
  <text x="550" y="70" text-anchor="middle" font-size="13" fill="#6e6e73">Sense → Route → Plan → Act → Verify</text>

  <!-- ═══════════════════════════════════════════ -->
  <!-- Central pipeline spine                      -->
  <!-- ═══════════════════════════════════════════ -->
  <line x1="400" y1="110" x2="400" y2="860" stroke="url(#pipeGrad)" stroke-width="3" opacity="0.12"/>

  <!-- ── STEP 0: User Input ── -->
  <g filter="url(#shadowSm)">
    <rect x="300" y="100" width="200" height="54" rx="27" fill="url(#glass)" stroke="rgba(0,122,255,0.20)" stroke-width="1.5"/>
    <text x="400" y="123" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">🎤  User Input</text>
    <text x="400" y="140" text-anchor="middle" font-size="9" fill="#6e6e73">voice transcription or typed text</text>
  </g>

  <!-- Arrow 0 → 1 -->
  <line x1="400" y1="154" x2="400" y2="182" stroke="#007aff" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ── STEP 1: ACK (Fast) ── -->
  <g filter="url(#shadowSm)">
    <rect x="580" y="136" width="180" height="42" rx="10" fill="white" stroke="rgba(0,122,255,0.12)" stroke-width="1"/>
    <text x="670" y="158" text-anchor="middle" font-size="10" fill="#007aff" font-weight="600">⚡ Instant ACK</text>
    <text x="670" y="170" text-anchor="middle" font-size="9" fill="#6e6e73">"On it…" → renderer</text>
  </g>
  <path d="M500,130 Q540,130 580,157" fill="none" stroke="#007aff" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- ── STEP 1: SENSE ── -->
  <g filter="url(#shadow)">
    <rect x="270" y="185" width="260" height="76" rx="14" fill="white" stroke="rgba(0,122,255,0.25)" stroke-width="1.5"/>
    <!-- Badge -->
    <rect x="282" y="193" width="56" height="20" rx="10" fill="url(#accentBlue)"/>
    <text x="310" y="207" text-anchor="middle" font-size="10" font-weight="700" fill="white">SENSE</text>
    <text x="345" y="207" font-size="10" fill="#6e6e73">①</text>
    <text x="290" y="228" font-size="11" font-weight="500" fill="#1d1d1f">WorldState Assembly</text>
    <text x="290" y="244" font-size="9" fill="#6e6e73">• Screen capture + Accessibility tree</text>
    <text x="290" y="256" font-size="9" fill="#6e6e73">• Active app / URL · Running agents</text>
  </g>

  <!-- Perception side card -->
  <g filter="url(#shadowSm)">
    <rect x="580" y="195" width="200" height="56" rx="10" fill="white" stroke="rgba(0,122,255,0.12)" stroke-width="1"/>
    <text x="680" y="216" text-anchor="middle" font-size="11" font-weight="600" fill="#1d1d1f">perception.py</text>
    <text x="680" y="232" text-anchor="middle" font-size="9" fill="#6e6e73">screenshot → Gemini Flash →</text>
    <text x="680" y="244" text-anchor="middle" font-size="9" fill="#6e6e73">structured scene understanding</text>
  </g>
  <line x1="530" y1="223" x2="580" y2="223" stroke="#007aff" stroke-width="1.2" stroke-dasharray="4 3"/>

  <!-- Arrow 1 → 2 -->
  <line x1="400" y1="261" x2="400" y2="295" stroke="#007aff" stroke-width="2" marker-end="url(#arrowBlue)"/>

  <!-- ── STEP 2: ROUTE ── -->
  <g filter="url(#shadow)">
    <rect x="270" y="298" width="260" height="92" rx="14" fill="white" stroke="rgba(175,82,222,0.25)" stroke-width="1.5"/>
    <rect x="282" y="306" width="62" height="20" rx="10" fill="url(#accentPurple)"/>
    <text x="313" y="320" text-anchor="middle" font-size="10" font-weight="700" fill="white">ROUTE</text>
    <text x="351" y="320" font-size="10" fill="#6e6e73">②</text>
    <text x="290" y="342" font-size="11" font-weight="500" fill="#1d1d1f">_is_conversational(text)?</text>
    <text x="290" y="358" font-size="9" fill="#6e6e73">Regex classifier: greetings, thanks,</text>
    <text x="290" y="370" font-size="9" fill="#6e6e73">mood queries, factual questions…</text>
  </g>

  <!-- Fast path branch (YES) -->
  <g filter="url(#shadowSm)">
    <rect x="580" y="306" width="200" height="72" rx="10" fill="white" stroke="rgba(255,45,85,0.20)" stroke-width="1.5"/>
    <rect x="592" y="314" width="68" height="18" rx="9" fill="url(#accentPeach)" opacity="0.85"/>
    <text x="626" y="327" text-anchor="middle" font-size="9" font-weight="700" fill="white">FAST PATH</text>
    <text x="680" y="344" text-anchor="middle" font-size="10" font-weight="500" fill="#1d1d1f">Flash LLM direct response</text>
    <text x="680" y="358" text-anchor="middle" font-size="9" fill="#6e6e73">No tools · No planning</text>
    <text x="680" y="370" text-anchor="middle" font-size="9" fill="#ff2d55" font-weight="500">&lt; 500ms latency</text>
  </g>
  <path d="M530,338 L580,338" fill="none" stroke="#ff2d55" stroke-width="1.5" marker-end="url(#arrowPeach)"/>
  <text x="548" y="332" font-size="9" fill="#ff2d55" font-weight="600">YES</text>

  <!-- Fast path → Response shortcut -->
  <path d="M780,342 Q840,342 840,700 L840,800 Q840,820 780,820 L540,820" fill="none" stroke="#ff2d55" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#arrowPeach)" opacity="0.5"/>
  <text x="852" y="580" font-size="9" fill="#ff2d55" opacity="0.6" transform="rotate(90 852 580)">skip to response</text>

  <!-- NO arrow → PLAN -->
  <line x1="400" y1="390" x2="400" y2="424" stroke="#af52de" stroke-width="2" marker-end="url(#arrowPurple)"/>
  <text x="410" y="412" font-size="9" fill="#af52de" font-weight="600">NO</text>

  <!-- ── STEP 3: PLAN ── -->
  <g filter="url(#shadow)">
    <rect x="270" y="427" width="260" height="88" rx="14" fill="white" stroke="rgba(175,82,222,0.25)" stroke-width="1.5"/>
    <rect x="282" y="435" width="52" height="20" rx="10" fill="url(#accentPurple)"/>
    <text x="308" y="449" text-anchor="middle" font-size="10" font-weight="700" fill="white">PLAN</text>
    <text x="341" y="449" font-size="10" fill="#6e6e73">③</text>
    <text x="290" y="470" font-size="11" font-weight="500" fill="#1d1d1f">MilestonePlan Builder</text>
    <text x="290" y="486" font-size="9" fill="#6e6e73">• Compound-task decomposition</text>
    <text x="290" y="498" font-size="9" fill="#6e6e73">• Template overlays (advisory)</text>
  </g>

  <!-- Side cards for Plan -->
  <g filter="url(#shadowSm)">
    <rect x="580" y="435" width="200" height="42" rx="10" fill="white" stroke="rgba(175,82,222,0.10)" stroke-width="1"/>
    <text x="680" y="456" text-anchor="middle" font-size="10" font-weight="500" fill="#1d1d1f">task_planner.py</text>
    <text x="680" y="468" text-anchor="middle" font-size="9" fill="#6e6e73">Milestones · Dependencies</text>
  </g>
  <g filter="url(#shadowSm)">
    <rect x="580" y="483" width="200" height="28" rx="10" fill="white" stroke="rgba(175,82,222,0.08)" stroke-width="1"/>
    <text x="680" y="501" text-anchor="middle" font-size="9" fill="#6e6e73">template_registry.py (skill packs)</text>
  </g>
  <line x1="530" y1="465" x2="580" y2="456" stroke="#af52de" stroke-width="1" stroke-dasharray="4 3"/>
  <line x1="530" y1="485" x2="580" y2="497" stroke="#af52de" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Arrow 3 → 4 -->
  <line x1="400" y1="515" x2="400" y2="550" stroke="#af52de" stroke-width="2" marker-end="url(#arrowPurple)"/>

  <!-- ── STEP 4: ACT ── -->
  <g filter="url(#shadow)">
    <rect x="240" y="553" width="320" height="108" rx="14" fill="white" stroke="rgba(52,199,89,0.25)" stroke-width="1.5"/>
    <rect x="252" y="561" width="44" height="20" rx="10" fill="url(#accentGreen)"/>
    <text x="274" y="575" text-anchor="middle" font-size="10" font-weight="700" fill="white">ACT</text>
    <text x="303" y="575" font-size="10" fill="#6e6e73">④</text>
    <text x="260" y="596" font-size="11" font-weight="500" fill="#1d1d1f">Milestone Executor — LLM Micro-Loop</text>
    <text x="260" y="614" font-size="9" fill="#6e6e73">For each milestone:</text>
    <text x="270" y="628" font-size="9" fill="#6e6e73">① Select tools (selector.py)</text>
    <text x="270" y="641" font-size="9" fill="#6e6e73">② Execute tool call → Observe result</text>
    <text x="270" y="654" font-size="9" fill="#6e6e73">③ Advance / retry · Cancel check</text>
  </g>

  <!-- Tool calls side card -->
  <g filter="url(#shadowSm)">
    <rect x="610" y="558" width="200" height="98" rx="10" fill="white" stroke="rgba(52,199,89,0.15)" stroke-width="1"/>
    <text x="710" y="578" text-anchor="middle" font-size="11" font-weight="600" fill="#1d1d1f">Available Tools</text>
    <rect x="625" y="588" width="70" height="22" rx="6" fill="#007aff" opacity="0.08"/>
    <text x="660" y="603" text-anchor="middle" font-size="9" fill="#007aff" font-weight="500">Browser ACI</text>
    <rect x="701" y="588" width="96" height="22" rx="6" fill="#34c759" opacity="0.08"/>
    <text x="749" y="603" text-anchor="middle" font-size="9" fill="#34c759" font-weight="500">Mac / AppleScript</text>
    <rect x="625" y="616" width="80" height="22" rx="6" fill="#af52de" opacity="0.08"/>
    <text x="665" y="631" text-anchor="middle" font-size="9" fill="#af52de" font-weight="500">GWorkspace</text>
    <rect x="711" y="616" width="86" height="22" rx="6" fill="#ffcc00" opacity="0.10"/>
    <text x="754" y="631" text-anchor="middle" font-size="9" fill="#8a6d00" font-weight="500">Memory / RAG</text>
    <rect x="625" y="644" width="170" height="5" rx="2.5" fill="#e5e5ea"/>
    <rect x="625" y="644" width="110" height="5" rx="2.5" fill="url(#accentGreen)" opacity="0.4"/>
  </g>
  <line x1="560" y1="605" x2="610" y2="605" stroke="#34c759" stroke-width="1.5" marker-end="url(#arrowGreen)"/>

  <!-- Gemini call from ACT -->
  <g filter="url(#shadowSm)">
    <rect x="90" y="575" width="120" height="56" rx="10" fill="white" stroke="rgba(175,82,222,0.20)" stroke-width="1.5"/>
    <text x="150" y="600" text-anchor="middle" font-size="18">✦</text>
    <text x="150" y="618" text-anchor="middle" font-size="10" font-weight="600" fill="#af52de">Gemini Pro</text>
    <text x="150" y="630" text-anchor="middle" font-size="8" fill="#6e6e73">tool selection + reasoning</text>
  </g>
  <line x1="240" y1="605" x2="210" y2="605" stroke="#af52de" stroke-width="1.5" marker-end="url(#arrowPurple)"/>

  <!-- Cancel signal -->
  <g filter="url(#shadowSm)">
    <rect x="90" y="640" width="120" height="30" rx="8" fill="#ff3b30" opacity="0.06" stroke="rgba(255,59,48,0.15)" stroke-width="1"/>
    <text x="150" y="660" text-anchor="middle" font-size="9" fill="#ff3b30" font-weight="500">⏹ Cancel check</text>
  </g>
  <path d="M150,640 L150,620 L160,620" fill="none" stroke="#ff3b30" stroke-width="1" stroke-dasharray="3 2" opacity="0.5"/>

  <!-- Arrow 4 → 5 -->
  <line x1="400" y1="661" x2="400" y2="696" stroke="#34c759" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ── STEP 5: VERIFY ── -->
  <g filter="url(#shadow)">
    <rect x="270" y="699" width="260" height="82" rx="14" fill="white" stroke="rgba(52,199,89,0.25)" stroke-width="1.5"/>
    <rect x="282" y="707" width="66" height="20" rx="10" fill="url(#accentGreen)"/>
    <text x="315" y="721" text-anchor="middle" font-size="10" font-weight="700" fill="white">VERIFY</text>
    <text x="355" y="721" font-size="10" fill="#6e6e73">⑤</text>
    <text x="290" y="742" font-size="11" font-weight="500" fill="#1d1d1f">Evidence Gate</text>
    <text x="290" y="758" font-size="9" fill="#6e6e73">• Per-tool verification strategies</text>
    <text x="290" y="770" font-size="9" fill="#6e6e73">• Pass → advance  ·  Fail → retry</text>
  </g>

  <!-- Retry loop arrow -->
  <path d="M530,740 Q570,740 570,680 Q570,620 530,610" fill="none" stroke="#ff2d55" stroke-width="1.2" stroke-dasharray="4 3" marker-end="url(#arrowPeach)" opacity="0.5"/>
  <text x="578" y="680" font-size="8" fill="#ff2d55" opacity="0.6">retry</text>

  <!-- Side card: verifier.py -->
  <g filter="url(#shadowSm)">
    <rect x="610" y="710" width="200" height="42" rx="10" fill="white" stroke="rgba(52,199,89,0.10)" stroke-width="1"/>
    <text x="710" y="732" text-anchor="middle" font-size="10" font-weight="500" fill="#1d1d1f">verifier.py</text>
    <text x="710" y="744" text-anchor="middle" font-size="9" fill="#6e6e73">DOM read-back · Vision verify</text>
  </g>
  <line x1="530" y1="740" x2="610" y2="731" stroke="#34c759" stroke-width="1" stroke-dasharray="4 3"/>

  <!-- Arrow 5 → Response -->
  <line x1="400" y1="781" x2="400" y2="808" stroke="#34c759" stroke-width="2" marker-end="url(#arrowGreen)"/>

  <!-- ── RESPONSE ── -->
  <g filter="url(#shadow)">
    <rect x="300" y="812" width="200" height="54" rx="27" fill="url(#glass)" stroke="rgba(52,199,89,0.25)" stroke-width="1.5"/>
    <text x="400" y="836" text-anchor="middle" font-size="13" font-weight="600" fill="#1d1d1f">✅  Response</text>
    <text x="400" y="852" text-anchor="middle" font-size="9" fill="#6e6e73">ws_callback → TTS → renderer</text>
  </g>

  <!-- Gemini provider label -->
  <g transform="translate(90, 480)">
    <rect width="120" height="22" rx="6" fill="#af52de" opacity="0.06"/>
    <text x="60" y="15" text-anchor="middle" font-size="9" fill="#af52de" font-weight="500">Gemini Flash (fast path)</text>
  </g>

  <!-- Legend -->
  <g transform="translate(60, 885)">
    <text x="0" y="0" font-size="10" font-weight="600" fill="#1d1d1f">Legend</text>
    <rect x="0" y="10" width="12" height="12" rx="3" fill="url(#accentBlue)"/>
    <text x="18" y="20" font-size="9" fill="#6e6e73">Sense</text>
    <rect x="60" y="10" width="12" height="12" rx="3" fill="url(#accentPurple)"/>
    <text x="78" y="20" font-size="9" fill="#6e6e73">Route / Plan</text>
    <rect x="150" y="10" width="12" height="12" rx="3" fill="url(#accentGreen)"/>
    <text x="168" y="20" font-size="9" fill="#6e6e73">Act / Verify</text>
    <rect x="230" y="10" width="12" height="12" rx="3" fill="url(#accentPeach)"/>
    <text x="248" y="20" font-size="9" fill="#6e6e73">Fast path</text>
    <line x1="310" y1="16" x2="340" y2="16" stroke="#6e6e73" stroke-width="1.2" stroke-dasharray="4 3"/>
    <text x="348" y="20" font-size="9" fill="#6e6e73">Internal link</text>
  </g>

  <text x="1040" y="905" text-anchor="end" font-size="9" fill="#aeaeb2">Moonwalk v1.0.0</text>
</svg>