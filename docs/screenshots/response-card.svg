<svg xmlns="http://www.w3.org/2000/svg" width="600" height="400" viewBox="0 0 600 400">
  <defs>
    <filter id="pill-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif; }
    </style>
  </defs>

  <rect width="600" height="400" fill="white"/>

  <!-- Glass pill — idle state (above card) -->
  <rect x="190" y="40" width="220" height="64" rx="32" ry="32"
        fill="rgba(255,255,255,0.75)"
        stroke="rgba(0,0,0,0.04)" stroke-width="1"
        filter="url(#pill-shadow)"/>
  <rect x="191" y="41" width="218" height="62" rx="31" ry="31"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1"/>
  <g transform="translate(224, 60)" fill="#6e6e73">
    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" transform="scale(0.917)"/>
    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" transform="scale(0.917)"/>
  </g>
  <text x="262" y="78" class="label" font-size="18" font-weight="500" fill="#1d1d1f" letter-spacing="-0.18">Hey Moonwalk</text>

  <!-- Response card — 440px wide, border-radius 18px, glass bg -->
  <rect x="80" y="120" width="440" height="200" rx="18" ry="18"
        fill="rgba(255,255,255,0.8)"
        stroke="rgba(0,0,0,0.04)" stroke-width="1"
        filter="url(#card-shadow)"/>
  <rect x="81" y="121" width="438" height="198" rx="17" ry="17"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1"/>

  <!-- Dismiss X button — top right, 26x26 circle -->
  <circle cx="496" cy="144" r="13" fill="rgba(0,0,0,0.05)"/>
  <line x1="491" y1="139" x2="501" y2="149" stroke="rgba(0,0,0,0.35)" stroke-width="1.5" stroke-linecap="round"/>
  <line x1="501" y1="139" x2="491" y2="149" stroke="rgba(0,0,0,0.35)" stroke-width="1.5" stroke-linecap="round"/>

  <!-- Response text — multi-line markdown-style content -->
  <text x="104" y="158" class="label" font-size="14.5" font-weight="400" fill="#1d1d1f" letter-spacing="-0.14">
    <tspan x="104" dy="0" font-weight="600" font-size="17">Weather in San Francisco</tspan>
    <tspan x="104" dy="28" fill="#1d1d1f">Currently 68°F with partly cloudy skies.</tspan>
    <tspan x="104" dy="24" fill="#1d1d1f">Humidity is at 72% with winds from the</tspan>
    <tspan x="104" dy="24" fill="#1d1d1f">west at 12 mph.</tspan>
    <tspan x="104" dy="32" fill="#1d1d1f">Tonight: Low of 54°F, clearing skies.</tspan>
    <tspan x="104" dy="24" fill="#1d1d1f">Tomorrow: High of 71°F, sunny.</tspan>
  </text>

  <!-- Blinking cursor ▌ -->
  <text x="340" y="290" class="label" font-size="14.5" fill="#007aff" opacity="0.7">▌</text>

  <!-- State label -->
  <text x="300" y="360" class="label" font-size="12" font-weight="500" fill="#86868b" text-anchor="middle" letter-spacing="0.5">RESPONSE CARD</text>
</svg>
