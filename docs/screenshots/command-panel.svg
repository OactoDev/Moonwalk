<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <filter id="panel-shadow" x="-10%" y="-20%" width="120%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.1)"/>
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="rgba(0,0,0,0.05)"/>
    </filter>
    <filter id="btn-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="rgba(0,122,255,0.4)"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif; }
    </style>
  </defs>

  <rect width="600" height="200" fill="white"/>

  <!-- Command panel — 640px → scaled to fit, 56px min-height, border-radius 28px -->
  <!-- Scaled: panel at ~520px wide to fit SVG frame -->
  <rect x="40" y="60" width="520" height="56" rx="28" ry="28"
        fill="rgba(255,255,255,0.75)"
        stroke="rgba(0,0,0,0.08)" stroke-width="1"
        filter="url(#panel-shadow)"/>
  <rect x="41" y="61" width="518" height="54" rx="27" ry="27"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1"/>

  <!-- Placeholder text in textarea -->
  <text x="68" y="93" class="label" font-size="15" font-weight="400" fill="#86868b" letter-spacing="-0.15">Type a request…</text>

  <!-- Send button — 44x44 blue circle, right side -->
  <circle cx="530" cy="88" r="22" fill="#007aff" filter="url(#btn-shadow)"/>

  <!-- Send arrow icon (paper plane) -->
  <g transform="translate(522, 80)" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <line x1="15" y1="1" x2="7.5" y2="9"/>
    <polygon points="15 1 10 15 7.5 9 1.5 6 15 1" fill="none"/>
  </g>

  <!-- State label -->
  <text x="300" y="155" class="label" font-size="12" font-weight="500" fill="#86868b" text-anchor="middle" letter-spacing="0.5">COMMAND PANEL (⌥ SPACE)</text>
</svg>
