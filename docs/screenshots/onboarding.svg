<svg xmlns="http://www.w3.org/2000/svg" width="600" height="520" viewBox="0 0 600 520">
  <defs>
    <filter id="card-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap');
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif; }
    </style>
  </defs>

  <rect width="600" height="520" fill="white"/>

  <!-- Dark glassmorphism card — 380px wide, dark bg, rounded 18px -->
  <rect x="110" y="20" width="380" height="440" rx="18" ry="18"
        fill="rgba(28,28,30,0.95)"
        stroke="rgba(255,255,255,0.1)" stroke-width="1"
        filter="url(#card-shadow)"/>

  <!-- Logo — circle with checkmark -->
  <circle cx="300" cy="68" r="16" fill="none" stroke="#4c8dff" stroke-width="1.5"/>
  <path d="M292 68 L297 73 L308 63" fill="none" stroke="#4c8dff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Title -->
  <text x="300" y="106" class="label" font-size="20" font-weight="700" fill="#f5f5f7" text-anchor="middle">Welcome to Moonwalk</text>
  <text x="300" y="124" class="label" font-size="13" font-weight="400" fill="#86868b" text-anchor="middle">Your AI desktop assistant</text>

  <!-- Description -->
  <text x="300" y="158" class="label" font-size="13" font-weight="400" fill="#c8c8cc" text-anchor="middle">Moonwalk uses voice and text to help you</text>
  <text x="300" y="174" class="label" font-size="13" font-weight="400" fill="#c8c8cc" text-anchor="middle">with tasks on your Mac.</text>

  <!-- Checklist items -->
  <!-- Item 1: Python backend ✅ -->
  <rect x="140" y="196" width="320" height="40" rx="10" ry="10" fill="rgba(255,255,255,0.05)"/>
  <text x="162" y="221" class="label" font-size="16">✅</text>
  <text x="186" y="221" class="label" font-size="13" font-weight="400" fill="#e5e5ea">Python backend</text>

  <!-- Item 2: WebSocket connection ✅ -->
  <rect x="140" y="246" width="320" height="40" rx="10" ry="10" fill="rgba(255,255,255,0.05)"/>
  <text x="162" y="271" class="label" font-size="16">✅</text>
  <text x="186" y="271" class="label" font-size="13" font-weight="400" fill="#e5e5ea">WebSocket connection</text>

  <!-- Item 3: Microphone access ⏳ -->
  <rect x="140" y="296" width="320" height="40" rx="10" ry="10" fill="rgba(255,255,255,0.05)"/>
  <text x="162" y="321" class="label" font-size="16">⏳</text>
  <text x="186" y="321" class="label" font-size="13" font-weight="400" fill="#e5e5ea">Microphone access</text>

  <!-- Continue button — blue pill -->
  <rect x="140" y="360" width="320" height="46" rx="12" ry="12" fill="#007aff"/>
  <text x="300" y="389" class="label" font-size="14" font-weight="600" fill="white" text-anchor="middle">Continue</text>

  <!-- Version -->
  <text x="300" y="434" class="label" font-size="11" font-weight="400" fill="#48484a" text-anchor="middle">v1.0.0</text>

  <!-- Label -->
  <text x="300" y="500" class="label" font-size="12" font-weight="500" fill="#86868b" text-anchor="middle" letter-spacing="0.5">ONBOARDING — SETUP CHECKLIST</text>
</svg>
