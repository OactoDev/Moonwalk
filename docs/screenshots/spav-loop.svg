<svg xmlns="http://www.w3.org/2000/svg" width="700" height="720" viewBox="0 0 700 720">
  <defs>
    <filter id="glass-shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="12" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <filter id="node-shadow" x="-15%" y="-15%" width="130%" height="145%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="rgba(0,0,0,0.07)"/>
    </filter>
    <filter id="glow-blue" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(0,122,255,0.3)"/>
    </filter>
    <filter id="glow-green" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(52,199,89,0.3)"/>
    </filter>
    <filter id="glow-orange" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(255,149,0,0.3)"/>
    </filter>
    <filter id="glow-purple" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(175,82,222,0.3)"/>
    </filter>
    <filter id="glow-red" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="rgba(255,59,48,0.25)"/>
    </filter>

    <marker id="arrow-down" viewBox="0 0 10 10" refX="5" refY="10" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M 0 0 L 5 10 L 10 0" fill="none" stroke="#007aff" stroke-width="2"/>
    </marker>

    <linearGradient id="bg" x1="0" y1="0" x2="0.3" y2="1">
      <stop offset="0%" stop-color="#f5f7fa"/>
      <stop offset="100%" stop-color="#ebeef3"/>
    </linearGradient>

    <style>
      .font { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Inter', sans-serif; }
      .mono { font-family: 'SF Mono', 'Menlo', 'Monaco', monospace; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="700" height="720" fill="url(#bg)"/>

  <!-- Title -->
  <text x="350" y="36" class="font" font-size="13" font-weight="600" fill="#86868b" text-anchor="middle" letter-spacing="1.5">AGENT LOOP — SENSE · PLAN · ACT · VERIFY</text>

  <!-- ── SENSE node ── -->
  <rect x="200" y="60" width="300" height="90" rx="18" ry="18"
        fill="rgba(255,255,255,0.72)" stroke="rgba(0,122,255,0.18)" stroke-width="1"
        filter="url(#node-shadow)"/>
  <!-- Blue accent top -->
  <rect x="200" y="60" width="300" height="4" rx="2" fill="#007aff" opacity="0.7"/>
  <!-- Icon: eye -->
  <circle cx="238" cy="97" r="14" fill="rgba(0,122,255,0.08)" filter="url(#glow-blue)"/>
  <circle cx="238" cy="97" r="5" fill="none" stroke="#007aff" stroke-width="1.5"/>
  <circle cx="238" cy="97" r="2" fill="#007aff"/>
  <ellipse cx="238" cy="97" rx="10" ry="7" fill="none" stroke="#007aff" stroke-width="1.2"/>

  <text x="264" y="92" class="font" font-size="18" font-weight="700" fill="#1d1d1f" letter-spacing="-0.3">Sense</text>
  <text x="264" y="112" class="font" font-size="12" font-weight="400" fill="#6e6e73">Screen capture · Accessibility tree · Glance</text>
  <text x="264" y="130" class="font" font-size="11" font-weight="500" fill="#007aff" opacity="0.7">perception.py · glance.py</text>

  <!-- Arrow S → P -->
  <line x1="350" y1="150" x2="350" y2="188" stroke="#007aff" stroke-width="2" opacity="0.4"/>
  <polygon points="344,182 350,194 356,182" fill="#007aff" opacity="0.5"/>

  <!-- ── PLAN node ── -->
  <rect x="200" y="196" width="300" height="90" rx="18" ry="18"
        fill="rgba(255,255,255,0.72)" stroke="rgba(52,199,89,0.18)" stroke-width="1"
        filter="url(#node-shadow)"/>
  <rect x="200" y="196" width="300" height="4" rx="2" fill="#34c759" opacity="0.7"/>
  <!-- Icon: lightbulb -->
  <circle cx="238" cy="233" r="14" fill="rgba(52,199,89,0.08)" filter="url(#glow-green)"/>
  <path d="M233 229 C233 224, 243 224, 243 229 C243 232, 240 234, 240 237 L236 237 C236 234, 233 232, 233 229Z"
        fill="none" stroke="#34c759" stroke-width="1.3" stroke-linejoin="round"/>
  <line x1="235.5" y1="239" x2="240.5" y2="239" stroke="#34c759" stroke-width="1.2" stroke-linecap="round"/>

  <text x="264" y="228" class="font" font-size="18" font-weight="700" fill="#1d1d1f" letter-spacing="-0.3">Plan</text>
  <text x="264" y="248" class="font" font-size="12" font-weight="400" fill="#6e6e73">LLM decomposes goal → milestones → steps</text>
  <text x="264" y="266" class="font" font-size="11" font-weight="500" fill="#34c759" opacity="0.7">planner.py · task_planner.py</text>

  <!-- Arrow P → A -->
  <line x1="350" y1="286" x2="350" y2="324" stroke="#34c759" stroke-width="2" opacity="0.4"/>
  <polygon points="344,318 350,330 356,318" fill="#34c759" opacity="0.5"/>

  <!-- ── ACT node ── -->
  <rect x="200" y="332" width="300" height="90" rx="18" ry="18"
        fill="rgba(255,255,255,0.72)" stroke="rgba(255,149,0,0.18)" stroke-width="1"
        filter="url(#node-shadow)"/>
  <rect x="200" y="332" width="300" height="4" rx="2" fill="#ff9500" opacity="0.7"/>
  <!-- Icon: lightning bolt -->
  <circle cx="238" cy="369" r="14" fill="rgba(255,149,0,0.08)" filter="url(#glow-orange)"/>
  <path d="M241 359 L234 371 L239 371 L235 379 L243 367 L238 367 Z"
        fill="#ff9500" stroke="none"/>

  <text x="264" y="364" class="font" font-size="18" font-weight="700" fill="#1d1d1f" letter-spacing="-0.3">Act</text>
  <text x="264" y="384" class="font" font-size="12" font-weight="400" fill="#6e6e73">Execute tool calls: click, type, open_app…</text>
  <text x="264" y="402" class="font" font-size="11" font-weight="500" fill="#ff9500" opacity="0.7">milestone_executor.py · tools/*</text>

  <!-- Arrow A → V -->
  <line x1="350" y1="422" x2="350" y2="460" stroke="#ff9500" stroke-width="2" opacity="0.4"/>
  <polygon points="344,454 350,466 356,454" fill="#ff9500" opacity="0.5"/>

  <!-- ── VERIFY node ── -->
  <rect x="200" y="468" width="300" height="90" rx="18" ry="18"
        fill="rgba(255,255,255,0.72)" stroke="rgba(175,82,222,0.18)" stroke-width="1"
        filter="url(#node-shadow)"/>
  <rect x="200" y="468" width="300" height="4" rx="2" fill="#af52de" opacity="0.7"/>
  <!-- Icon: checkmark shield -->
  <circle cx="238" cy="505" r="14" fill="rgba(175,82,222,0.08)" filter="url(#glow-purple)"/>
  <path d="M232 502 L238 498 L244 502 L244 509 L238 513 L232 509 Z"
        fill="none" stroke="#af52de" stroke-width="1.3"/>
  <path d="M235 505 L237.5 508 L242 502" fill="none" stroke="#af52de" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>

  <text x="264" y="500" class="font" font-size="18" font-weight="700" fill="#1d1d1f" letter-spacing="-0.3">Verify</text>
  <text x="264" y="520" class="font" font-size="12" font-weight="400" fill="#6e6e73">Screenshot diff + LLM confirms success</text>
  <text x="264" y="538" class="font" font-size="11" font-weight="500" fill="#af52de" opacity="0.7">verifier.py · world_state.py</text>

  <!-- ── REPLAN decision ── -->
  <!-- Arrow V → diamond -->
  <line x1="350" y1="558" x2="350" y2="592" stroke="#af52de" stroke-width="2" opacity="0.4"/>
  <polygon points="344,586 350,598 356,586" fill="#af52de" opacity="0.5"/>

  <!-- Diamond -->
  <polygon points="350,600 400,635 350,670 300,635"
           fill="rgba(255,255,255,0.72)" stroke="rgba(255,59,48,0.2)" stroke-width="1"
           filter="url(#node-shadow)"/>
  <text x="350" y="632" class="font" font-size="12" font-weight="700" fill="#1d1d1f" text-anchor="middle">Success?</text>
  <text x="350" y="648" class="font" font-size="10" font-weight="500" fill="#6e6e73" text-anchor="middle">replan if needed</text>

  <!-- ── Success path: right exit → Done -->
  <line x1="400" y1="635" x2="500" y2="635" stroke="#34c759" stroke-width="2" opacity="0.5"/>
  <rect x="500" y="620" width="80" height="30" rx="15" fill="rgba(52,199,89,0.1)" stroke="rgba(52,199,89,0.25)" stroke-width="1"/>
  <text x="540" y="640" class="font" font-size="13" font-weight="600" fill="#34c759" text-anchor="middle">✓ Done</text>

  <!-- ── Fail path: left exit → loops back to SENSE -->
  <line x1="300" y1="635" x2="120" y2="635" stroke="#ff3b30" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="635" x2="120" y2="105" stroke="#ff3b30" stroke-width="2" opacity="0.4"/>
  <line x1="120" y1="105" x2="200" y2="105" stroke="#ff3b30" stroke-width="2" opacity="0.4"/>
  <polygon points="194,99 206,105 194,111" fill="#ff3b30" opacity="0.5"/>

  <!-- Retry label -->
  <rect x="80" y="360" width="60" height="22" rx="8" fill="rgba(255,59,48,0.06)" stroke="rgba(255,59,48,0.15)" stroke-width="1"/>
  <text x="110" y="375" class="font" font-size="10" font-weight="600" fill="#ff3b30" text-anchor="middle">Retry</text>

  <!-- Labels on decision paths -->
  <text x="450" y="625" class="font" font-size="10" font-weight="600" fill="#34c759">YES</text>
  <text x="252" y="625" class="font" font-size="10" font-weight="600" fill="#ff3b30">NO</text>

  <!-- Bottom tagline -->
  <text x="350" y="706" class="font" font-size="11" font-weight="500" fill="#86868b" text-anchor="middle">Each cycle runs autonomously until the goal is achieved or max retries hit</text>
</svg>
