<svg xmlns="http://www.w3.org/2000/svg" width="600" height="200" viewBox="0 0 600 200">
  <defs>
    <filter id="pill-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(0,0,0,0.08)"/>
    </filter>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&amp;display=swap');
      .label { font-family: -apple-system, BlinkMacSystemFont, 'Inter', 'SF Pro Display', sans-serif; }
    </style>
  </defs>

  <rect width="600" height="200" fill="white"/>

  <!-- Glass pill — listening state: 440px wide, 64px tall -->
  <rect x="80" y="68" width="440" height="64" rx="32" ry="32"
        fill="rgba(255,255,255,0.75)"
        stroke="rgba(0,0,0,0.04)" stroke-width="1"
        filter="url(#pill-shadow)"/>
  <rect x="81" y="69" width="438" height="62" rx="31" ry="31"
        fill="none" stroke="rgba(255,255,255,0.9)" stroke-width="1"/>

  <!-- Mic icon (gray #86868b for listening state) -->
  <g transform="translate(114, 88)" fill="#86868b">
    <path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3z" transform="scale(0.917)"/>
    <path d="M17 11c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.61 6.43 6 6.92V21h2v-3.08c3.39-.49 6-3.39 6-6.92h-2z" transform="scale(0.917)"/>
  </g>

  <!-- Typewriter text — blue #007aff in listening state -->
  <text x="152" y="106" class="label" font-size="18" font-weight="500" fill="#007aff" letter-spacing="-0.18">Open Safari and search for…</text>

  <!-- Blinking cursor — 2px wide, blue -->
  <rect x="420" y="90" width="2" height="20" rx="1" fill="#007aff" opacity="0.8"/>

  <!-- State label -->
  <text x="300" y="168" class="label" font-size="12" font-weight="500" fill="#86868b" text-anchor="middle" letter-spacing="0.5">LISTENING STATE</text>
</svg>
